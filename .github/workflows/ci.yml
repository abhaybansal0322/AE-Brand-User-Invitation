name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      - name: Format check
        run: test -z "$(gofmt -l cmd internal)"
      - name: Test
        run: go test ./...
      - name: Race test
        run: go test -race ./...
      - name: Build
        run: go build ./cmd/server
